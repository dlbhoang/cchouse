<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Real Estate</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {
      background: #f8fafc;
      padding: 30px;
    }

    .search-bar {
      max-width: 1300px;
      margin: auto;
      padding: 24px 16px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .search-top {
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 12px;
      flex-wrap: wrap;
    }

    .left-group {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .combobox {
      min-width: 150px;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      background: white;
    }

    .search-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 250px;
    }

    .search-input input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .right-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      height: 40px;
      border: none;
      border-radius: 10px;
      padding: 0 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .btn-primary {
      background: #0588F0;
      color: white;
    }

    .btn-secondary {
      background: white;
      color: #0588F0;
      border: 1px solid #0588F0;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-item {
      flex: 1;
      min-width: 180px;
      position: relative;
    }

    .filter-item label {
      position: absolute;
      top: -8px;
      left: 12px;
      background: white;
      padding: 0 4px;
      font-size: 12px;
      color: #737373;
    }

    .filter-item select,
    .filter-item input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      outline: none;
    }

    @media (max-width: 768px) {
      .search-top {
        flex-direction: column;
      }

      .left-group,
      .right-group,
      .filters {
        width: 100%;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="search-bar">

  <!-- Top Search -->
  <div class="search-top">
    <div class="left-group">

      <div class="combobox">
        <span>Mua bán</span>
        ▼
      </div>

      <div class="search-input">
        🎤
        <input type="text" placeholder="Tìm kiếm bất động sản..." />
      </div>

    </div>

    <div class="right-group">
      <div class="combobox">
        <span>Khu vực</span>
        ▼
      </div>

      <div class="combobox">
        <span>Đang bán</span>
        ▼
      </div>

      <button class="btn btn-primary" onclick="searchProperty()">
        🔍 Tìm kiếm
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">

    <div class="filter-item">
      <label>Vị trí</label>
      <select>
        <option>Chọn</option>
        <option>Hà Nội</option>
        <option>TP.HCM</option>
      </select>
    </div>

    <div class="filter-item">
      <label>Khoảng giá</label>
      <input type="number" placeholder="Giá" />
    </div>

    <div class="filter-item">
      <label>Diện tích</label>
      <select>
        <option>Chọn</option>
        <option>50m²</option>
        <option>100m²</option>
        <option>200m²</option>
      </select>
    </div>

    <div class="filter-item">
      <label>Loại BĐS</label>
      <select>
        <option>Chọn</option>
        <option>Nhà phố</option>
        <option>Chung cư</option>
        <option>Biệt thự</option>
      </select>
    </div>

    <button class="btn btn-secondary">
      ⚙️ Lọc thêm
    </button>

  </div>
</div>

<script>
  function searchProperty() {
    const keyword = document.querySelector(".search-input input").value;
    alert("Bạn đang tìm: " + keyword);
  }
</script>

</body>
</html>
